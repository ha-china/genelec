substitutions:
  name: m5stack-dial-media
  friendly_name: M5Stack Dial
  volume_step: "2.0"
  ui_timeout_ms: "10000"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600
    then:
      - output.turn_on: power_hold
      - bm8563.read_time:
          id: rtc_time

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

api:

esp32_improv:
  authorizer: none

improv_serial:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_hotspot_password

captive_portal:

spi:
  clk_pin: GPIO6
  mosi_pin: GPIO5

i2c:
  sda: GPIO11
  scl: GPIO12
  scan: true
  id: internal_i2c

time:
  - platform: bm8563
    id: rtc_time
    update_interval: never

  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - bm8563.write_time:
            id: rtc_time

globals:
  - id: volume_cache
    type: float
    restore_value: yes
    initial_value: "-20.0"
  - id: muted_cache
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: power_cache
    type: bool
    restore_value: yes
    initial_value: "true"
  - id: button_long_press_fired
    type: bool
    restore_value: no
    initial_value: "false"
  - id: ui_last_interaction_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: buzzer_frequency
    type: float
    restore_value: yes
    initial_value: "2000.0"

output:
  - platform: gpio
    pin: GPIO46
    id: power_hold
  - platform: ledc
    pin: GPIO9
    id: backlight_pwm
  - platform: ledc
    pin: GPIO3
    id: buzzer_output
    frequency: 2000Hz

rtttl:
  output: buzzer_output

light:
  - platform: monochromatic
    output: backlight_pwm
    id: backlight
    name: "${friendly_name} Backlight"
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

  - platform: monochromatic
    output: buzzer_output
    id: buzzer_light
    name: "${friendly_name} Buzzer"
    icon: mdi:speaker-wireless
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s

number:
  - platform: template
    id: buzzer_tone
    name: "${friendly_name} Buzzer Tone"
    optimistic: true
    restore_value: true
    min_value: 200
    max_value: 5000
    step: 50
    initial_value: 2000
    unit_of_measurement: "Hz"
    mode: slider
    set_action:
      - lambda: |-
          id(buzzer_frequency) = x;
          id(buzzer_output).update_frequency(x);

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 18
  - file: "gfonts://Roboto"
    id: font_medium
    size: 24
  - file: "gfonts://Roboto"
    id: font_large
    size: 60

event:
  - platform: template
    id: media_controls
    name: "${friendly_name} Media Controls"
    device_class: button
    event_types:
      - volume_up
      - volume_down
      - mute_toggle
      - power_toggle

script:
  - id: activate_ui
    then:
      - lambda: |-
          id(ui_last_interaction_ms) = millis();
      - component.update: round_display

  - id: media_mute_toggle
    then:
      - script.execute: activate_ui
      - lambda: |-
          id(muted_cache) = !id(muted_cache);
      - event.trigger:
          id: media_controls
          event_type: mute_toggle
      - component.update: round_display

  - id: media_power_toggle
    then:
      - script.execute: activate_ui
      - lambda: |-
          id(power_cache) = !id(power_cache);
      - event.trigger:
          id: media_controls
          event_type: power_toggle
      - component.update: round_display

  - id: media_volume_up
    then:
      - script.execute: activate_ui
      - lambda: |-
          id(volume_cache) = std::min(0.0f, id(volume_cache) + float(${volume_step}));
      - event.trigger:
          id: media_controls
          event_type: volume_up
      - component.update: round_display

  - id: media_volume_down
    then:
      - script.execute: activate_ui
      - lambda: |-
          id(volume_cache) = std::max(-130.0f, id(volume_cache) - float(${volume_step}));
      - event.trigger:
          id: media_controls
          event_type: volume_down
      - component.update: round_display

sensor:
  - platform: rotary_encoder
    id: dial_encoder
    name: "${friendly_name} Dial"
    pin_a:
      number: GPIO41
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO40
      mode:
        input: true
        pullup: true
    resolution: 1
    restore_mode: ALWAYS_ZERO
    entity_category: diagnostic
    on_clockwise:
      - script.execute: media_volume_down
    on_anticlockwise:
      - script.execute: media_volume_up

  - platform: wifi_signal
    id: wifi_rssi
    name: "${friendly_name} WiFi Signal"
    entity_category: diagnostic
    update_interval: 30s

binary_sensor:
  - platform: gpio
    id: front_button
    name: "${friendly_name} Button"
    pin:
      number: GPIO42
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      then:
        - lambda: |-
            id(button_long_press_fired) = false;
        - delay: 3s
        - if:
            condition:
              binary_sensor.is_on: front_button
            then:
              - lambda: |-
                  id(button_long_press_fired) = true;
              - script.execute: media_power_toggle
    on_release:
      then:
        - if:
            condition:
              lambda: return !id(button_long_press_fired);
            then:
              - script.execute: media_mute_toggle

  - platform: touchscreen
    id: touch_play_zone
    internal: true
    touchscreen_id: dial_touch
    x_min: 80
    x_max: 159
    y_min: 60
    y_max: 239
    on_press:
      - script.execute: activate_ui

  - platform: touchscreen
    id: touch_target_zone
    internal: true
    touchscreen_id: dial_touch
    x_min: 0
    x_max: 239
    y_min: 0
    y_max: 59
    on_press:
      - script.execute: activate_ui

text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip_address
      name: "${friendly_name} IP Address"
      entity_category: diagnostic

  - platform: homeassistant
    id: target_media_player
    name: "${friendly_name} Target Media Player"
    entity_id: input_text.genelec_active_target
    on_value:
      - script.execute: activate_ui

  - platform: homeassistant
    id: target_media_name
    entity_id: input_text.genelec_active_target
    attribute: friendly_name
    internal: true
    on_value:
      - component.update: round_display

  - platform: homeassistant
    id: target_media_source
    entity_id: input_text.genelec_active_target
    attribute: source
    internal: true
    on_value:
      - component.update: round_display

  - platform: template
    id: rtc_clock
    name: "${friendly_name} RTC Clock"
    icon: mdi:clock-outline
    lambda: |-
      auto now = id(rtc_time).now();
      if (!now.is_valid()) {
        return std::string("--:--");
      }
      char buffer[6];
      snprintf(buffer, sizeof(buffer), "%02d:%02d", now.hour, now.minute);
      return std::string(buffer);
    update_interval: 30s

  - platform: template
    id: rtc_date
    name: "${friendly_name} RTC Date"
    icon: mdi:calendar
    lambda: |-
      auto now = id(rtc_time).now();
      if (!now.is_valid()) {
        return std::string("----/--/--");
      }
      char buffer[11];
      snprintf(buffer, sizeof(buffer), "%04d/%02d/%02d", now.year, now.month, now.day_of_month);
      return std::string(buffer);
    update_interval: 5min

button:
  - platform: template
    name: "${friendly_name} Refresh Display"
    on_press:
      - script.execute: activate_ui

  - platform: template
    name: "${friendly_name} Sync RTC"
    on_press:
      - bm8563.write_time:
          id: rtc_time

  - platform: template
    name: "${friendly_name} Read RTC"
    on_press:
      - bm8563.read_time:
          id: rtc_time

  - platform: template
    name: "${friendly_name} Buzzer Test"
    on_press:
      - lambda: |-
          id(buzzer_output).update_frequency(id(buzzer_frequency));
      - rtttl.play: "two_short:d=4,o=5,b=100:16e6,16e6"

touchscreen:
  - platform: ft5x06
    id: dial_touch
    i2c_id: internal_i2c
    display: round_display
    address: 0x38
    interrupt_pin: GPIO14

display:
  - platform: ili9xxx
    id: round_display
    model: GC9A01A
    cs_pin: GPIO7
    dc_pin: GPIO4
    reset_pin: GPIO8
    invert_colors: true
    dimensions:
      width: 240
      height: 240
    update_interval: 500ms
    lambda: |-
      it.fill(Color::BLACK);
      const bool wifi_connected = !id(wifi_ip_address).state.empty();
      if (!wifi_connected) {
        it.printf(120, 78, id(font_medium), Color(110, 210, 255), TextAlign::CENTER, "%s", "Not Connected");
        it.printf(120, 118, id(font_small), Color(220, 220, 220), TextAlign::CENTER, "%s", "Open HA app");
        it.printf(120, 146, id(font_small), Color(220, 220, 220), TextAlign::CENTER, "%s", "Add this device");
        it.printf(120, 174, id(font_small), Color(170, 170, 170), TextAlign::CENTER, "%s", "BLE setup ready");
        it.printf(120, 220, id(font_small), Color(120, 120, 120), TextAlign::BOTTOM_CENTER, "%s", "Fallback AP ready");
        return;
      }

      const bool dashboard_active = id(ui_last_interaction_ms) != 0 && (millis() - id(ui_last_interaction_ms)) < ${ui_timeout_ms};
      if (!dashboard_active) {
        std::string clock = id(rtc_clock).state;
        std::string date = id(rtc_date).state;
        it.printf(120, 78, id(font_large), Color::WHITE, TextAlign::CENTER, "%s", clock.c_str());
        it.printf(120, 128, id(font_medium), Color(160, 160, 160), TextAlign::CENTER, "%s", date.c_str());
        it.printf(120, 182, id(font_medium), Color(110, 210, 255), TextAlign::CENTER, "%.1f dB", id(volume_cache));
        return;
      }
      std::string target = id(target_media_player).state;
      std::string target_name = id(target_media_name).state;
      if (!target_name.empty()) {
        target = target_name;
      } else if (target.empty()) {
        target = "Media Player";
      }
      if (target.size() > 16) {
        target = target.substr(0, 16);
      }
      const float volume_ratio = std::max(0.0f, std::min(1.0f, (id(volume_cache) + 130.0f) / 130.0f));
      const int gauge_steps = 120;
      const float start_deg = 135.0f;
      const float sweep_deg = 270.0f;
      const float radius = 101.0f;
      const float band_inner = radius - 4.0f;
      const float band_outer = radius;
      for (int i = 0; i < gauge_steps; i++) {
        const float t = float(i) / float(gauge_steps - 1);
        const float a = (start_deg + t * sweep_deg) * 3.1415926f / 180.0f;
        const int x1 = int(120 + cosf(a) * band_inner);
        const int y1 = int(120 + sinf(a) * band_inner);
        const int x2 = int(120 + cosf(a) * band_outer);
        const int y2 = int(120 + sinf(a) * band_outer);
        it.line(x1, y1, x2, y2, Color(235, 235, 235));
      }
      const int active_steps = int(volume_ratio * float(gauge_steps - 1));
      for (int i = 0; i <= active_steps; i++) {
        const float t = float(i) / float(gauge_steps - 1);
        const float a = (start_deg + t * sweep_deg) * 3.1415926f / 180.0f;
        const int x1 = int(120 + cosf(a) * band_inner);
        const int y1 = int(120 + sinf(a) * band_inner);
        const int x2 = int(120 + cosf(a) * band_outer);
        const int y2 = int(120 + sinf(a) * band_outer);
        it.line(x1, y1, x2, y2, Color(110, 220, 140));
      }
      const float end_a = (start_deg + volume_ratio * sweep_deg) * 3.1415926f / 180.0f;
      it.filled_circle(int(120 + cosf(end_a) * (radius - 2.0f)), int(120 + sinf(end_a) * (radius - 2.0f)), 3, Color(110, 220, 140));
      it.printf(120, 28, id(font_small), Color(150, 190, 220), TextAlign::TOP_CENTER, "%s", target.c_str());
      it.printf(120, 98, id(font_large), Color::WHITE, TextAlign::CENTER, "%.1f", id(volume_cache));
      it.printf(120, 138, id(font_small), Color(170, 170, 170), TextAlign::CENTER, "%s", "dB");
      std::string source = id(target_media_source).state;
      if (source.empty()) {
        source = "-";
      }
      if (source.size() > 18) {
        source = source.substr(0, 18);
      }
      it.printf(120, 160, id(font_small), Color(150, 190, 220), TextAlign::CENTER, "%s", source.c_str());
      if (!id(power_cache)) {
        it.filled_rectangle(52, 192, 58, 26, Color(18, 18, 18));
        it.rectangle(52, 192, 58, 26, Color(120, 44, 44));
      }
      if (id(muted_cache)) {
        it.filled_rectangle(130, 192, 58, 26, Color(18, 18, 18));
        it.rectangle(130, 192, 58, 26, Color(120, 44, 44));
      }
      if (!id(power_cache)) {
        it.printf(81, 198, id(font_small), Color(255, 120, 120), TextAlign::TOP_CENTER, "%s", "OFF");
      }
      if (id(muted_cache)) {
        it.printf(159, 198, id(font_small), Color(255, 120, 120), TextAlign::TOP_CENTER, "%s", "MUTE");
      }
      it.printf(40, 224, id(font_small), Color(120, 120, 120), TextAlign::BOTTOM_CENTER, "-");
      it.printf(120, 224, id(font_small), Color(120, 120, 120), TextAlign::BOTTOM_CENTER, "o");
      it.printf(200, 224, id(font_small), Color(120, 120, 120), TextAlign::BOTTOM_CENTER, "+");
