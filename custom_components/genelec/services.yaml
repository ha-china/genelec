wake_up:
  name: Wake up
  description: Wake up the device from standby/sleep mode.
  target:
    entity:
      domain: media_player
      integration: genelec
  fields:
    zone_id:
      name: Zone ID
      description: Optional. Apply to all Genelec speakers in this zone ID.
      required: false
      selector:
        number:
          min: 1
          max: 65535
          step: 1
          mode: box
    zone_name:
      name: Zone name
      description: Optional. Apply to all Genelec speakers with this exact zone name.
      required: false
      selector:
        text:

