restore_profile:
  name: Restore profile
  description: Restore a saved profile from device memory.
  target:
    entity:
      integration: genelec
  fields:
    zone_id:
      name: Zone ID
      description: Optional. Apply to all Genelec speakers in this zone ID.
      required: false
      selector:
        number:
          min: 1
          max: 65535
          step: 1
          mode: box
    zone_name:
      name: Zone name
      description: Optional. Apply to all Genelec speakers with this exact zone name.
      required: false
      selector:
        text:
    profile_id:
      name: Profile ID
      description: Profile ID to restore (integer 0-5)
      required: true
      selector:
        number:
          min: 0
          max: 5
          step: 1
          mode: box
    startup:
      name: Set as startup profile
      description: Set this profile as the default after power reset
      required: false
      default: false
      selector:
        boolean:

set_network_ipv4:
  name: Set network IPv4
  description: Write /network/ipv4 settings.
  target:
    entity:
      integration: genelec
  fields:
    zone_id:
      name: Zone ID
      description: Optional. Apply to all Genelec speakers in this zone ID.
      required: false
      selector:
        number:
          min: 1
          max: 65535
          step: 1
          mode: box
    zone_name:
      name: Zone name
      description: Optional. Apply to all Genelec speakers with this exact zone name.
      required: false
      selector:
        text:
    hostname:
      name: Hostname
      description: Device hostname (1-63 chars).
      required: false
      selector:
        text:
    mode:
      name: Mode
      description: Network mode.
      required: false
      selector:
        select:
          options:
            - auto
            - static
    ip:
      name: IP address
      description: Required when mode is static.
      required: false
      selector:
        text:
    mask:
      name: Netmask
      description: Required when mode is static.
      required: false
      selector:
        text:
    gw:
      name: Gateway
      description: Required when mode is static.
      required: false
      selector:
        text:
    vol_ip:
      name: Multicast IP
      description: Multicast group IP, set 0.0.0.0 to disable multicast.
      required: false
      selector:
        text:
    vol_port:
      name: Multicast port
      description: Multicast port (1024-65535).
      required: false
      selector:
        number:
          min: 1024
          max: 65535
          step: 1
          mode: box
    auth:
      name: Auth
      description: Credentials in user:password format.
      required: false
      selector:
        text:

