blueprint:
  name: M5Stack Dial Media Event Controller
  description: |
    Bind an ESPHome M5Stack Dial event entity to Genelec zone media players.

    Expected event types from ESPHome:
    - `button_single`
    - `button_double`
    - `button_long`
    - `volume_apply`
    - `rotate_left`
    - `rotate_right`
    - `zone_prev`
    - `zone_next`
    - `profile_prev`
    - `profile_next`
    - `source_prev`
    - `source_next`
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  input:
    dial_event:
      name: M5Stack Dial Event
      description: ESPHome event entity created by the M5Stack Dial config.
      selector:
        entity:
          filter:
            - domain:
                - event
          multiple: false
    media_player:
      name: Media Player
      description: Fallback media player when no zone list is configured.
      selector:
        entity:
          filter:
            - domain:
                - media_player
          multiple: false
    zone_media_players:
      name: Zone Media Players
      description: Ordered list of Genelec zone group media players to cycle on the M5 second screen.
      default: []
      selector:
        entity:
          filter:
            - integration: genelec
              domain:
                - media_player
          multiple: true
    current_zone_helper:
      name: Current Zone Input Text
      description: Input text helper used to remember the currently selected zone media_player entity_id.
      default: []
      selector:
        entity:
          filter:
            - domain:
                - input_text
          multiple: false
    default_volume:
      name: Default Volume
      description: Used when an action is set to `Set Volume`.
      default: 35
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider
    volume_step:
      name: Volume Step (dB)
      description: Used by rotate left/right volume actions.
      default: 1.0
      selector:
        number:
          min: 0.5
          max: 6.0
          step: 0.5
          mode: slider
    button_single_action:
      name: Button Single Press
      default: toggle_mute
      selector:
        select:
          options:
            - label: Do Nothing
              value: none
            - label: Turn On
              value: turn_on
            - label: Turn Off
              value: turn_off
            - label: Mute
              value: mute
            - label: Unmute
              value: unmute
            - label: Toggle (Power)
              value: toggle_power
            - label: Toggle (Play)
              value: toggle_play
            - label: Toggle (Mute)
              value: toggle_mute
            - label: Previous Track
              value: previous_track
            - label: Next Track
              value: next_track
            - label: Set Volume
              value: set_volume
          multiple: false
    button_double_action:
      name: Button Double Press
      default: toggle_play
      selector:
        select:
          options:
            - label: Do Nothing
              value: none
            - label: Turn On
              value: turn_on
            - label: Turn Off
              value: turn_off
            - label: Mute
              value: mute
            - label: Unmute
              value: unmute
            - label: Toggle (Power)
              value: toggle_power
            - label: Toggle (Play)
              value: toggle_play
            - label: Toggle (Mute)
              value: toggle_mute
            - label: Previous Track
              value: previous_track
            - label: Next Track
              value: next_track
            - label: Set Volume
              value: set_volume
          multiple: false
    button_long_action:
      name: Button Long Press
      default: toggle_power
      selector:
        select:
          options:
            - label: Do Nothing
              value: none
            - label: Turn On
              value: turn_on
            - label: Turn Off
              value: turn_off
            - label: Mute
              value: mute
            - label: Unmute
              value: unmute
            - label: Toggle (Power)
              value: toggle_power
            - label: Toggle (Play)
              value: toggle_play
            - label: Toggle (Mute)
              value: toggle_mute
            - label: Previous Track
              value: previous_track
            - label: Next Track
              value: next_track
            - label: Set Volume
              value: set_volume
          multiple: false
    rotate_left_action:
      name: Rotate Left
      default: volume_down
      selector:
        select:
          options:
            - label: Do Nothing
              value: none
            - label: Volume Down
              value: volume_down
            - label: Previous Track
              value: previous_track
            - label: Next Track
              value: next_track
          multiple: false
    rotate_right_action:
      name: Rotate Right
      default: volume_up
      selector:
        select:
          options:
            - label: Do Nothing
              value: none
            - label: Volume Up
              value: volume_up
            - label: Previous Track
              value: previous_track
            - label: Next Track
              value: next_track
          multiple: false

mode: restart

triggers:
  - trigger: state
    entity_id: !input dial_event
    not_from:
      - unavailable
      - unknown
    not_to:
      - unavailable
      - unknown
  - trigger: state
    entity_id: !input media_player
    not_from:
      - unavailable
      - unknown
    not_to:
      - unavailable
      - unknown
  - trigger: state
    entity_id: !input zone_media_players
    not_from:
      - unavailable
      - unknown
    not_to:
      - unavailable
      - unknown
  - trigger: time_pattern
    seconds: "/5"

variables:
  dial_event_entity: !input dial_event
  media_player_entity: !input media_player
  zone_media_players: !input zone_media_players
  current_zone_helper: !input current_zone_helper
  default_volume: !input default_volume
  volume_step_db: !input volume_step
  volume_step_level: >-
    {{ (volume_step_db | float(1.0)) / 130.0 }}
  button_single_action: !input button_single_action
  button_double_action: !input button_double_action
  button_long_action: !input button_long_action
  rotate_left_action: !input rotate_left_action
  rotate_right_action: !input rotate_right_action
  trigger_platform: "{{ trigger.platform | default('') }}"
  event_type: >-
    {% if trigger.platform == 'state' and trigger.to_state is not none %}
      {{ trigger.to_state.attributes.event_type | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  configured_zone_media_players: >-
    {{ zone_media_players if zone_media_players is sequence and zone_media_players is not string else [] }}
  m5_device_id: >-
    {{ device_id(dial_event_entity) | default('', true) if dial_event_entity is string and dial_event_entity != '' else '' }}
  current_zone_text: >-
    {% if m5_device_id is string and m5_device_id != '' %}
      {{ device_entities(m5_device_id) | select('match', '^text\..*_zone_display$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  current_profile_text: >-
    {% if m5_device_id is string and m5_device_id != '' %}
      {{ device_entities(m5_device_id) | select('match', '^text\..*_profile_display$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  current_source_text: >-
    {% if m5_device_id is string and m5_device_id != '' %}
      {{ device_entities(m5_device_id) | select('match', '^text\..*_source_display$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  current_mute_text: >-
    {% if m5_device_id is string and m5_device_id != '' %}
      {{ device_entities(m5_device_id) | select('match', '^text\..*_mute_display$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  current_power_text: >-
    {% if m5_device_id is string and m5_device_id != '' %}
      {{ device_entities(m5_device_id) | select('match', '^text\..*_power_display$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  current_volume_text: >-
    {% if m5_device_id is string and m5_device_id != '' %}
      {{ device_entities(m5_device_id) | select('match', '^text\..*_volume_display$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  current_volume_step_number: >-
    {% if m5_device_id is string and m5_device_id != '' %}
      {{ device_entities(m5_device_id) | select('match', '^number\..*_volume_step$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  current_zone_media: >-
    {% set helper_value = states(current_zone_helper) if current_zone_helper is string and current_zone_helper != '' else '' %}
    {% if helper_value in configured_zone_media_players %}
      {{ helper_value }}
    {% elif configured_zone_media_players | count > 0 %}
      {{ configured_zone_media_players[0] }}
    {% else %}
      {{ media_player_entity }}
    {% endif %}
  current_zone_device: >-
    {% if current_zone_media is string and current_zone_media != '' %}
      {{ device_id(current_zone_media) | default('', true) }}
    {% else %}
      {{ '' }}
    {% endif %}
  current_profile_select: >-
    {% if current_zone_device is string and current_zone_device != '' %}
      {{ device_entities(current_zone_device) | select('match', '^select\\..*_profile$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  current_source_list: >-
    {{ state_attr(current_zone_media, 'source_list') | default([], true) }}
  current_source: >-
    {{ state_attr(current_zone_media, 'source') | default('', true) }}
  current_volume_level: >-
    {{ state_attr(current_zone_media, 'volume_level') | float((default_volume | float(35)) / 100) }}
  current_volume_db: >-
    {{ (-130.0 + (current_volume_level | float(0)) * 130.0) | round(1) }}
  current_volume_display: >-
    {{ '%.1f dB' | format(current_volume_db | float(-20.0)) }}
  displayed_volume_db: >-
    {% if current_volume_text is string and current_volume_text != '' %}
      {% set raw = states(current_volume_text) | default('', true) %}
      {% set trimmed = raw[:-3] if raw.endswith(' dB') else raw %}
      {{ trimmed | float(current_volume_db | float(-20.0)) }}
    {% else %}
      {{ current_volume_db | float(-20.0) }}
    {% endif %}
  displayed_volume_level: >-
    {{ [1.0, [0.0, ((displayed_volume_db | float(-20.0)) + 130.0) / 130.0] | max] | min }}
  current_is_muted: >-
    {% set muted = state_attr(current_zone_media, 'is_volume_muted') %}
    {{ muted in [true, 'true', 'True', 'on', 'On'] }}
  current_power_state: >-
    {{ states(current_zone_media) | default('', true) }}
  current_mute_badge: >-
    {{ 'Mute' if current_is_muted else '' }}
  current_power_badge: >-
    {{ 'OFF' if current_power_state == 'off' else '' }}
  current_zone_name: >-
    {% set friendly = state_attr(current_zone_media, 'friendly_name') | default('', true) %}
    {% if friendly.endswith(' Group') %}
      {{ friendly[:-6] }}
    {% elif friendly != '' %}
      {{ friendly }}
    {% else %}
      {{ current_zone_media }}
    {% endif %}
  current_profile_options: >-
    {{ state_attr(current_profile_select, 'options') | default([], true) }}
  current_profile: >-
    {{ states(current_profile_select) if current_profile_select is string and current_profile_select != '' else '' }}
  previous_zone_media: >-
    {% set zones = configured_zone_media_players %}
    {% set current = current_zone_media %}
    {% set ns = namespace(result='') %}
    {% if zones | count == 0 %}
      {{ '' }}
    {% elif current not in zones %}
      {{ zones[-1] }}
    {% else %}
      {% for zone in zones %}
        {% if zone == current %}
          {% set ns.result = zones[loop.index0 - 1] %}
        {% endif %}
      {% endfor %}
      {{ ns.result }}
    {% endif %}
  next_zone_media: >-
    {% set zones = configured_zone_media_players %}
    {% set current = current_zone_media %}
    {% set ns = namespace(result='') %}
    {% if zones | count == 0 %}
      {{ '' }}
    {% elif current not in zones %}
      {{ zones[0] }}
    {% else %}
      {% for zone in zones %}
        {% if zone == current %}
          {% set ns.result = zones[0] if loop.last else zones[loop.index0 + 1] %}
        {% endif %}
      {% endfor %}
      {{ ns.result }}
    {% endif %}
  previous_zone_name: >-
    {% set friendly = state_attr(previous_zone_media, 'friendly_name') | default('', true) %}
    {% if friendly.endswith(' Group') %}
      {{ friendly[:-6] }}
    {% elif friendly != '' %}
      {{ friendly }}
    {% else %}
      {{ previous_zone_media }}
    {% endif %}
  next_zone_name: >-
    {% set friendly = state_attr(next_zone_media, 'friendly_name') | default('', true) %}
    {% if friendly.endswith(' Group') %}
      {{ friendly[:-6] }}
    {% elif friendly != '' %}
      {{ friendly }}
    {% else %}
      {{ next_zone_media }}
    {% endif %}
  previous_zone_device: >-
    {% if previous_zone_media is string and previous_zone_media != '' %}
      {{ device_id(previous_zone_media) | default('', true) }}
    {% else %}
      {{ '' }}
    {% endif %}
  next_zone_device: >-
    {% if next_zone_media is string and next_zone_media != '' %}
      {{ device_id(next_zone_media) | default('', true) }}
    {% else %}
      {{ '' }}
    {% endif %}
  previous_zone_profile_select: >-
    {% if previous_zone_device is string and previous_zone_device != '' %}
      {{ device_entities(previous_zone_device) | select('match', '^select\\..*_profile$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  next_zone_profile_select: >-
    {% if next_zone_device is string and next_zone_device != '' %}
      {{ device_entities(next_zone_device) | select('match', '^select\\..*_profile$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  previous_zone_profile: >-
    {{ states(previous_zone_profile_select) if previous_zone_profile_select is string and previous_zone_profile_select != '' else '' }}
  next_zone_profile: >-
    {{ states(next_zone_profile_select) if next_zone_profile_select is string and next_zone_profile_select != '' else '' }}
  previous_zone_source: >-
    {{ state_attr(previous_zone_media, 'source') | default('', true) }}
  next_zone_source: >-
    {{ state_attr(next_zone_media, 'source') | default('', true) }}
  previous_zone_volume_level: >-
    {{ state_attr(previous_zone_media, 'volume_level') | float((default_volume | float(35)) / 100) }}
  next_zone_volume_level: >-
    {{ state_attr(next_zone_media, 'volume_level') | float((default_volume | float(35)) / 100) }}
  previous_zone_volume_display: >-
    {{ '%.1f dB' | format((-130.0 + (previous_zone_volume_level | float(0)) * 130.0) | round(1)) }}
  next_zone_volume_display: >-
    {{ '%.1f dB' | format((-130.0 + (next_zone_volume_level | float(0)) * 130.0) | round(1)) }}
  previous_zone_is_muted: >-
    {% set muted = state_attr(previous_zone_media, 'is_volume_muted') %}
    {{ muted in [true, 'true', 'True', 'on', 'On'] }}
  next_zone_is_muted: >-
    {% set muted = state_attr(next_zone_media, 'is_volume_muted') %}
    {{ muted in [true, 'true', 'True', 'on', 'On'] }}
  previous_zone_power_state: >-
    {{ states(previous_zone_media) | default('', true) }}
  next_zone_power_state: >-
    {{ states(next_zone_media) | default('', true) }}
  previous_zone_mute_badge: >-
    {{ 'Mute' if previous_zone_is_muted else '' }}
  next_zone_mute_badge: >-
    {{ 'Mute' if next_zone_is_muted else '' }}
  previous_zone_power_badge: >-
    {{ 'OFF' if previous_zone_power_state == 'off' else '' }}
  next_zone_power_badge: >-
    {{ 'OFF' if next_zone_power_state == 'off' else '' }}
  previous_profile: >-
    {% set options = current_profile_options if current_profile_options is sequence and current_profile_options is not string else [] %}
    {% set current = current_profile %}
    {% set ns = namespace(result='') %}
    {% if options | count == 0 %}
      {{ '' }}
    {% elif current not in options %}
      {{ options[-1] }}
    {% else %}
      {% for option in options %}
        {% if option == current %}
          {% set ns.result = options[loop.index0 - 1] %}
        {% endif %}
      {% endfor %}
      {{ ns.result }}
    {% endif %}
  next_profile: >-
    {% set options = current_profile_options if current_profile_options is sequence and current_profile_options is not string else [] %}
    {% set current = current_profile %}
    {% set ns = namespace(result='') %}
    {% if options | count == 0 %}
      {{ '' }}
    {% elif current not in options %}
      {{ options[0] }}
    {% else %}
      {% for option in options %}
        {% if option == current %}
          {% set ns.result = options[0] if loop.last else options[loop.index0 + 1] %}
        {% endif %}
      {% endfor %}
      {{ ns.result }}
    {% endif %}
  previous_source: >-
    {% set options = current_source_list if current_source_list is sequence and current_source_list is not string else [] %}
    {% set current = current_source %}
    {% set ns = namespace(result='') %}
    {% if options | count == 0 %}
      {{ '' }}
    {% elif current not in options %}
      {{ options[-1] }}
    {% else %}
      {% for option in options %}
        {% if option == current %}
          {% set ns.result = options[loop.index0 - 1] %}
        {% endif %}
      {% endfor %}
      {{ ns.result }}
    {% endif %}
  next_source: >-
    {% set options = current_source_list if current_source_list is sequence and current_source_list is not string else [] %}
    {% set current = current_source %}
    {% set ns = namespace(result='') %}
    {% if options | count == 0 %}
      {{ '' }}
    {% elif current not in options %}
      {{ options[0] }}
    {% else %}
      {% for option in options %}
        {% if option == current %}
          {% set ns.result = options[0] if loop.last else options[loop.index0 + 1] %}
        {% endif %}
      {% endfor %}
      {{ ns.result }}
    {% endif %}
  selected_action: >-
    {% if event_type == 'button_single' %}
      {{ button_single_action }}
    {% elif event_type == 'button_double' %}
      {{ button_double_action }}
    {% elif event_type == 'button_long' %}
      {{ button_long_action }}
    {% elif event_type == 'rotate_left' %}
      {{ rotate_left_action }}
    {% elif event_type == 'rotate_right' %}
      {{ rotate_right_action }}
    {% else %}
      none
    {% endif %}

actions:
  - if:
      - condition: template
        value_template: "{{ current_zone_helper is string and current_zone_helper != '' and configured_zone_media_players | count > 0 and states(current_zone_helper) not in configured_zone_media_players }}"
    then:
      - action: input_text.set_value
        target:
          entity_id: "{{ current_zone_helper }}"
        data:
          value: "{{ current_zone_media }}"

  - if:
      - condition: template
        value_template: "{{ event_type == '' and current_zone_text is string and current_zone_text != '' and states(current_zone_text) != current_zone_name }}"
    then:
      - action: text.set_value
        target:
          entity_id: "{{ current_zone_text }}"
        data:
          value: "{{ current_zone_name }}"

  - if:
      - condition: template
        value_template: "{{ event_type == '' and current_profile_text is string and current_profile_text != '' and states(current_profile_text) != current_profile }}"
    then:
      - action: text.set_value
        target:
          entity_id: "{{ current_profile_text }}"
        data:
          value: "{{ current_profile }}"

  - if:
      - condition: template
        value_template: "{{ event_type == '' and current_source_text is string and current_source_text != '' and states(current_source_text) != current_source }}"
    then:
      - action: text.set_value
        target:
          entity_id: "{{ current_source_text }}"
        data:
          value: "{{ current_source }}"

  - if:
      - condition: template
        value_template: "{{ event_type == '' and current_volume_text is string and current_volume_text != '' and states(current_volume_text) != current_volume_display }}"
    then:
      - action: text.set_value
        target:
          entity_id: "{{ current_volume_text }}"
        data:
          value: "{{ current_volume_display }}"

  - if:
      - condition: template
        value_template: "{{ event_type == '' and current_volume_step_number is string and current_volume_step_number != '' and (states(current_volume_step_number) | float(1.0)) != (volume_step_db | float(1.0)) }}"
    then:
      - action: number.set_value
        target:
          entity_id: "{{ current_volume_step_number }}"
        data:
          value: "{{ volume_step_db | float(1.0) }}"

  - if:
      - condition: template
        value_template: "{{ event_type == '' and current_mute_text is string and current_mute_text != '' and states(current_mute_text) != current_mute_badge }}"
    then:
      - action: text.set_value
        target:
          entity_id: "{{ current_mute_text }}"
        data:
          value: "{{ current_mute_badge }}"

  - if:
      - condition: template
        value_template: "{{ event_type == '' and current_power_text is string and current_power_text != '' and states(current_power_text) != current_power_badge }}"
    then:
      - action: text.set_value
        target:
          entity_id: "{{ current_power_text }}"
        data:
          value: "{{ current_power_badge }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ event_type == 'volume_apply' and current_volume_text is string and current_volume_text != '' }}"
        sequence:
          - action: media_player.volume_set
            target:
              entity_id: "{{ current_zone_media }}"
            data:
              volume_level: "{{ displayed_volume_level }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'turn_on' }}"
        sequence:
          - action: media_player.turn_on
            target:
              entity_id: "{{ current_zone_media }}"
          - if:
              - condition: template
                value_template: "{{ current_power_text is string and current_power_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_power_text }}"
                data:
                  value: ""
          - if:
              - condition: template
                value_template: "{{ current_volume_text is string and current_volume_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_volume_text }}"
                data:
                  value: "{{ current_volume_display }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'turn_off' }}"
        sequence:
          - action: media_player.turn_off
            target:
              entity_id: "{{ current_zone_media }}"
          - if:
              - condition: template
                value_template: "{{ current_power_text is string and current_power_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_power_text }}"
                data:
                  value: "OFF"
          - if:
              - condition: template
                value_template: "{{ current_volume_text is string and current_volume_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_volume_text }}"
                data:
                  value: "{{ current_volume_display }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'mute' }}"
        sequence:
          - action: media_player.volume_mute
            target:
              entity_id: "{{ current_zone_media }}"
            data:
              is_volume_muted: true
          - if:
              - condition: template
                value_template: "{{ current_mute_text is string and current_mute_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_mute_text }}"
                data:
                  value: "Mute"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'unmute' }}"
        sequence:
          - action: media_player.volume_mute
            target:
              entity_id: "{{ current_zone_media }}"
            data:
              is_volume_muted: false
          - if:
              - condition: template
                value_template: "{{ current_mute_text is string and current_mute_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_mute_text }}"
                data:
                  value: ""

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'toggle_power' }}"
        sequence:
          - action: media_player.toggle
            target:
              entity_id: "{{ current_zone_media }}"
          - if:
              - condition: template
                value_template: "{{ current_power_text is string and current_power_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_power_text }}"
                data:
                  value: "{{ '' if current_power_state == 'off' else 'OFF' }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'toggle_play' }}"
        sequence:
          - action: media_player.media_play_pause
            target:
              entity_id: "{{ current_zone_media }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'toggle_mute' }}"
        sequence:
          - action: media_player.volume_mute
            target:
              entity_id: "{{ current_zone_media }}"
            data:
              is_volume_muted: >-
                {{ not (state_attr(current_zone_media, 'is_volume_muted') | default(false)) }}
          - if:
              - condition: template
                value_template: "{{ current_mute_text is string and current_mute_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_mute_text }}"
                data:
                  value: "{{ '' if current_is_muted else 'Mute' }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'previous_track' }}"
        sequence:
          - action: media_player.media_previous_track
            target:
              entity_id: "{{ current_zone_media }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'next_track' }}"
        sequence:
          - action: media_player.media_next_track
            target:
              entity_id: "{{ current_zone_media }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'set_volume' }}"
        sequence:
          - action: media_player.volume_set
            target:
              entity_id: "{{ current_zone_media }}"
            data:
              volume_level: "{{ (default_volume | float(35)) / 100 }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'volume_up' }}"
        sequence:
          - action: media_player.volume_set
            target:
              entity_id: "{{ current_zone_media }}"
            data:
              volume_level: >-
                {{ [1.0, (state_attr(current_zone_media, 'volume_level') | float(0)) + volume_step_level] | min }}

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'volume_down' }}"
        sequence:
          - action: media_player.volume_set
            target:
              entity_id: "{{ current_zone_media }}"
            data:
              volume_level: >-
                {{ [0.0, (state_attr(current_zone_media, 'volume_level') | float(0)) - volume_step_level] | max }}

      - conditions:
          - condition: template
            value_template: "{{ event_type == 'zone_prev' and current_zone_helper is string and current_zone_helper != '' and previous_zone_media != '' }}"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: "{{ current_zone_helper }}"
            data:
              value: "{{ previous_zone_media }}"
          - if:
              - condition: template
                value_template: "{{ current_zone_text is string and current_zone_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_zone_text }}"
                data:
                  value: "{{ previous_zone_name }}"
          - if:
              - condition: template
                value_template: "{{ current_profile_text is string and current_profile_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_profile_text }}"
                data:
                  value: "{{ previous_zone_profile }}"
          - if:
              - condition: template
                value_template: "{{ current_source_text is string and current_source_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_source_text }}"
                data:
                  value: "{{ previous_zone_source }}"
          - if:
              - condition: template
                value_template: "{{ current_mute_text is string and current_mute_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_mute_text }}"
                data:
                  value: "{{ previous_zone_mute_badge }}"
          - if:
              - condition: template
                value_template: "{{ current_power_text is string and current_power_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_power_text }}"
                data:
                  value: "{{ previous_zone_power_badge }}"
          - if:
              - condition: template
                value_template: "{{ current_volume_text is string and current_volume_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_volume_text }}"
                data:
                  value: "{{ previous_zone_volume_display }}"

      - conditions:
          - condition: template
            value_template: "{{ event_type == 'zone_next' and current_zone_helper is string and current_zone_helper != '' and next_zone_media != '' }}"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: "{{ current_zone_helper }}"
            data:
              value: "{{ next_zone_media }}"
          - if:
              - condition: template
                value_template: "{{ current_zone_text is string and current_zone_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_zone_text }}"
                data:
                  value: "{{ next_zone_name }}"
          - if:
              - condition: template
                value_template: "{{ current_profile_text is string and current_profile_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_profile_text }}"
                data:
                  value: "{{ next_zone_profile }}"
          - if:
              - condition: template
                value_template: "{{ current_source_text is string and current_source_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_source_text }}"
                data:
                  value: "{{ next_zone_source }}"
          - if:
              - condition: template
                value_template: "{{ current_mute_text is string and current_mute_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_mute_text }}"
                data:
                  value: "{{ next_zone_mute_badge }}"
          - if:
              - condition: template
                value_template: "{{ current_power_text is string and current_power_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_power_text }}"
                data:
                  value: "{{ next_zone_power_badge }}"
          - if:
              - condition: template
                value_template: "{{ current_volume_text is string and current_volume_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_volume_text }}"
                data:
                  value: "{{ next_zone_volume_display }}"

      - conditions:
          - condition: template
            value_template: "{{ event_type == 'profile_prev' and current_profile_select is string and current_profile_select != '' }}"
        sequence:
          - action: select.select_previous
            target:
              entity_id: "{{ current_profile_select }}"
          - if:
              - condition: template
                value_template: "{{ current_profile_text is string and current_profile_text != '' and previous_profile != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_profile_text }}"
                data:
                  value: "{{ previous_profile }}"

      - conditions:
          - condition: template
            value_template: "{{ event_type == 'profile_next' and current_profile_select is string and current_profile_select != '' }}"
        sequence:
          - action: select.select_next
            target:
              entity_id: "{{ current_profile_select }}"
          - if:
              - condition: template
                value_template: "{{ current_profile_text is string and current_profile_text != '' and next_profile != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_profile_text }}"
                data:
                  value: "{{ next_profile }}"

      - conditions:
          - condition: template
            value_template: "{{ event_type == 'source_prev' and current_zone_media is string and current_zone_media != '' and previous_source != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ current_zone_media }}"
            data:
              source: "{{ previous_source }}"
          - if:
              - condition: template
                value_template: "{{ current_source_text is string and current_source_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_source_text }}"
                data:
                  value: "{{ previous_source }}"

      - conditions:
          - condition: template
            value_template: "{{ event_type == 'source_next' and current_zone_media is string and current_zone_media != '' and next_source != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ current_zone_media }}"
            data:
              source: "{{ next_source }}"
          - if:
              - condition: template
                value_template: "{{ current_source_text is string and current_source_text != '' }}"
            then:
              - action: text.set_value
                target:
                  entity_id: "{{ current_source_text }}"
                data:
                  value: "{{ next_source }}"
