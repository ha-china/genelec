blueprint:
  name: Philips Hue Tap Dial Switch (ZHA / Media Only)
  author: ha-china
  source_url: https://github.com/danielpetrovic/home-assistant-config/blob/main/blueprints/automation/danielpetrovic/philips-hue-tap-dial-switch.yaml
  description: |
    # Philips Hue Tap Dial Switch (ZHA / Media Only)

    Adapted from Daniel Petrovic's original Philips Hue Tap Dial blueprint.
    This version keeps the ZHA event model and last-pressed rotary behavior,
    but simplifies the blueprint to media-only control for this project.

    Supported actions:
    - media power/mute controls
    - volume
    - Genelec input source presets and source cycling
    - Genelec profile cycling
    - Genelec LED intensity 0 / 100

    Rotary behavior follows the last pressed button, similar to the original blueprint.
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  input:
    version_info:
      name: Version History
      description: |
        - **2026.03.1: Rewrite to ZHA media-only Genelec control**
          - Changed: Removed Zigbee2MQTT support
          - Changed: Removed custom, light, adaptive, and schedule features
          - Added: Genelec source preset actions
          - Added: Genelec source/profile cycling actions
          - Added: Genelec LED intensity 0 / 100 actions
          - Added: Genelec input toggle between Analog and AoIP 01 + AoIP 02
          - Improved: Kept original last-pressed dial workflow for media control
          - Credit: Adapted from Daniel Petrovic's original blueprint
      collapsed: true
      icon: mdi:history
      input: {}
    zha_remote:
      name: Remote Device (ZHA)
      description: |
        `required` `device`

        Select the Philips Hue Tap Dial Switch device from ZHA.
      selector:
        device:
          entity:
            - domain:
                - sensor
              device_class:
                - battery
          filter:
            - integration: zha
              manufacturer: Signify Netherlands B.V.
              model: RDM002
          multiple: false
    last_pressed:
      name: Last Pressed Input Text Helper
      description: |
        `required` `entity`

        Create a unique input_text helper for each dial to remember which button
        was pressed most recently. Rotary actions use this to decide which media
        binding to run.
      selector:
        entity:
          filter:
            - domain:
                - input_text
          multiple: false
    rotate_volume_step:
      name: Rotate Volume Step
      description: Volume step used for volume up/down rotary mode.
      default: 0.05
      selector:
        number:
          min: 0.01
          max: 0.20
          step: 0.01
          mode: slider
    button_1_media:
      name: Button 1 - Media
      icon: mdi:numeric-1-circle-outline
      collapsed: true
      input:
        button_1_media:
          name: Media Player
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - media_player
              multiple: false
        button_1_default_volume_enabled:
          name: Enable Default Volume
          default: false
          selector:
            boolean: {}
        button_1_default_volume:
          name: Default Volume
          default: 35
          selector:
            number:
              min: 0
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider
        button_1_short_release_action:
          name: Short Release
          default: toggle_mute
          selector:
            select:
              options: &media_action_options
                - label: Do Nothing
                  value: none
                - label: Turn On
                  value: turn_on
                - label: Turn Off
                  value: turn_off
                - label: Mute
                  value: mute
                - label: Unmute
                  value: unmute
                - label: Toggle (Power)
                  value: toggle_power
                - label: Toggle (Mute)
                  value: toggle_mute
                - label: Toggle (Input)
                  value: source_toggle_analog_aoip12
                - label: Set Volume
                  value: set_volume
                - label: Source Analog
                  value: source_analog
                - label: Source AoIP 01
                  value: source_aoip_01
                - label: Source AoIP 02
                  value: source_aoip_02
                - label: Source Analog + AoIP 01
                  value: source_analog_aoip_01
                - label: Source Analog + AoIP 02
                  value: source_analog_aoip_02
                - label: Source AoIP 01 + AoIP 02
                  value: source_aoip_12
                - label: Source Mix
                  value: source_mix
                - label: Source Previous
                  value: source_previous
                - label: Source Next
                  value: source_next
                - label: Profile Previous
                  value: profile_previous
                - label: Profile Next
                  value: profile_next
                - label: LED 0
                  value: led_0
                - label: LED 100
                  value: led_100
              multiple: false
        button_1_long_press_action:
          name: Long Press
          default: toggle_power
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_1_double_press_action:
          name: Double Press
          default: none
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_1_triple_press_action:
          name: Triple Press
          default: none
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_1_rotate_mode:
          name: Rotate Mode
          default: volume
          selector:
            select:
              options: &rotate_mode_options
                - label: None
                  value: none
                - label: Volume
                  value: volume
                - label: Source
                  value: source
                - label: Profile
                  value: profile
                - label: LED 0/100
                  value: led
              multiple: false
    button_2_media:
      name: Button 2 - Media
      icon: mdi:numeric-2-circle-outline
      collapsed: true
      input:
        button_2_media:
          name: Media Player
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - media_player
              multiple: false
        button_2_default_volume_enabled:
          name: Enable Default Volume
          default: false
          selector:
            boolean: {}
        button_2_default_volume:
          name: Default Volume
          default: 35
          selector:
            number:
              min: 0
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider
        button_2_short_release_action:
          name: Short Release
          default: toggle_mute
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_2_long_press_action:
          name: Long Press
          default: toggle_power
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_2_double_press_action:
          name: Double Press
          default: none
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_2_triple_press_action:
          name: Triple Press
          default: none
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_2_rotate_mode:
          name: Rotate Mode
          default: volume
          selector:
            select:
              options: *rotate_mode_options
              multiple: false
    button_3_media:
      name: Button 3 - Media
      icon: mdi:numeric-3-circle-outline
      collapsed: true
      input:
        button_3_media:
          name: Media Player
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - media_player
              multiple: false
        button_3_default_volume_enabled:
          name: Enable Default Volume
          default: false
          selector:
            boolean: {}
        button_3_default_volume:
          name: Default Volume
          default: 35
          selector:
            number:
              min: 0
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider
        button_3_short_release_action:
          name: Short Release
          default: toggle_mute
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_3_long_press_action:
          name: Long Press
          default: toggle_power
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_3_double_press_action:
          name: Double Press
          default: none
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_3_triple_press_action:
          name: Triple Press
          default: none
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_3_rotate_mode:
          name: Rotate Mode
          default: volume
          selector:
            select:
              options: *rotate_mode_options
              multiple: false
    button_4_media:
      name: Button 4 - Media
      icon: mdi:numeric-4-circle-outline
      collapsed: true
      input:
        button_4_media:
          name: Media Player
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - media_player
              multiple: false
        button_4_default_volume_enabled:
          name: Enable Default Volume
          default: false
          selector:
            boolean: {}
        button_4_default_volume:
          name: Default Volume
          default: 35
          selector:
            number:
              min: 0
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider
        button_4_short_release_action:
          name: Short Release
          default: toggle_mute
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_4_long_press_action:
          name: Long Press
          default: toggle_power
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_4_double_press_action:
          name: Double Press
          default: none
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_4_triple_press_action:
          name: Triple Press
          default: none
          selector:
            select:
              options: *media_action_options
              multiple: false
        button_4_rotate_mode:
          name: Rotate Mode
          default: volume
          selector:
            select:
              options: *rotate_mode_options
              multiple: false

mode: single

triggers:
  - trigger: event
    event_type: zha_event
    event_data:
      device_id: !input zha_remote
    id: zha_event

variables:
  last_pressed: !input last_pressed
  rotate_volume_step: !input rotate_volume_step
  zha_command: "{{ trigger.event.data.command if trigger.event is defined else '' }}"
  command: "{{ zha_command }}"
  step_mode: "{{ trigger.event.data.params.step_mode | default('0') if trigger.event is defined else '0' }}"
  step_size: "{{ trigger.event.data.params.step_size | default(0) if trigger.event is defined else 0 }}"
  button_num: "{{ command | regex_replace(find='[^1-4]', replace='') | default(states(last_pressed), true) }}"
  rotate_left: "{{ command == 'step_with_on_off' and step_mode == 'StepMode.Down' and step_size | int(0) != 255 }}"
  rotate_right: "{{ command == 'step_with_on_off' and step_mode == 'StepMode.Up' and step_size | int(0) != 255 }}"

  button_1_media: !input button_1_media
  button_1_default_volume_enabled: !input button_1_default_volume_enabled
  button_1_default_volume: !input button_1_default_volume
  button_1_short_release_action: !input button_1_short_release_action
  button_1_long_press_action: !input button_1_long_press_action
  button_1_double_press_action: !input button_1_double_press_action
  button_1_triple_press_action: !input button_1_triple_press_action
  button_1_rotate_mode: !input button_1_rotate_mode

  button_2_media: !input button_2_media
  button_2_default_volume_enabled: !input button_2_default_volume_enabled
  button_2_default_volume: !input button_2_default_volume
  button_2_short_release_action: !input button_2_short_release_action
  button_2_long_press_action: !input button_2_long_press_action
  button_2_double_press_action: !input button_2_double_press_action
  button_2_triple_press_action: !input button_2_triple_press_action
  button_2_rotate_mode: !input button_2_rotate_mode

  button_3_media: !input button_3_media
  button_3_default_volume_enabled: !input button_3_default_volume_enabled
  button_3_default_volume: !input button_3_default_volume
  button_3_short_release_action: !input button_3_short_release_action
  button_3_long_press_action: !input button_3_long_press_action
  button_3_double_press_action: !input button_3_double_press_action
  button_3_triple_press_action: !input button_3_triple_press_action
  button_3_rotate_mode: !input button_3_rotate_mode

  button_4_media: !input button_4_media
  button_4_default_volume_enabled: !input button_4_default_volume_enabled
  button_4_default_volume: !input button_4_default_volume
  button_4_short_release_action: !input button_4_short_release_action
  button_4_long_press_action: !input button_4_long_press_action
  button_4_double_press_action: !input button_4_double_press_action
  button_4_triple_press_action: !input button_4_triple_press_action
  button_4_rotate_mode: !input button_4_rotate_mode

  selected_media: >-
    {% set mapping = {'1': button_1_media, '2': button_2_media, '3': button_3_media, '4': button_4_media} %}
    {{ mapping.get(button_num, '') }}
  selected_media_device: >-
    {% if selected_media is string and selected_media != '' %}
      {{ device_id(selected_media) | default('', true) }}
    {% else %}
      {{ '' }}
    {% endif %}
  selected_source_media: >-
    {{ selected_media }}
  selected_profile_select: >-
    {% if selected_media_device is string and selected_media_device != '' %}
      {{ device_entities(selected_media_device) | select('match', '^select\\..*_profile$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  selected_led_intensity: >-
    {% if selected_media_device is string and selected_media_device != '' %}
      {{ device_entities(selected_media_device) | select('match', '^number\\..*_led_intensity$') | list | first | default('') }}
    {% else %}
      {{ '' }}
    {% endif %}
  selected_source_list: >-
    {{ state_attr(selected_source_media, 'source_list') | default([], true) }}
  selected_source_current: >-
    {{ state_attr(selected_source_media, 'source') | default('', true) }}
  selected_source_previous: >-
    {% set options = selected_source_list if selected_source_list is sequence and selected_source_list is not string else [] %}
    {% set current = selected_source_current %}
    {% set ns = namespace(result='') %}
    {% if options | count == 0 %}
      {{ '' }}
    {% elif current not in options %}
      {{ options[-1] }}
    {% else %}
      {% for option in options %}
        {% if option == current %}
          {% set ns.result = options[loop.index0 - 1] %}
        {% endif %}
      {% endfor %}
      {{ ns.result }}
    {% endif %}
  selected_source_next: >-
    {% set options = selected_source_list if selected_source_list is sequence and selected_source_list is not string else [] %}
    {% set current = selected_source_current %}
    {% set ns = namespace(result='') %}
    {% if options | count == 0 %}
      {{ '' }}
    {% elif current not in options %}
      {{ options[0] }}
    {% else %}
      {% for option in options %}
        {% if option == current %}
          {% set ns.result = options[0] if loop.last else options[loop.index0 + 1] %}
        {% endif %}
      {% endfor %}
      {{ ns.result }}
    {% endif %}
  selected_default_volume: >-
    {% set mapping = {'1': button_1_default_volume, '2': button_2_default_volume, '3': button_3_default_volume, '4': button_4_default_volume} %}
    {{ mapping.get(button_num, 35) }}
  selected_default_volume_enabled: >-
    {% set mapping = {'1': button_1_default_volume_enabled, '2': button_2_default_volume_enabled, '3': button_3_default_volume_enabled, '4': button_4_default_volume_enabled} %}
    {{ mapping.get(button_num, false) }}
  selected_rotate_mode: >-
    {% set mapping = {'1': button_1_rotate_mode, '2': button_2_rotate_mode, '3': button_3_rotate_mode, '4': button_4_rotate_mode} %}
    {{ mapping.get(button_num, 'none') }}
  selected_action: >-
    {% set short_map = {'1': button_1_short_release_action, '2': button_2_short_release_action, '3': button_3_short_release_action, '4': button_4_short_release_action} %}
    {% set long_map = {'1': button_1_long_press_action, '2': button_2_long_press_action, '3': button_3_long_press_action, '4': button_4_long_press_action} %}
    {% set double_map = {'1': button_1_double_press_action, '2': button_2_double_press_action, '3': button_3_double_press_action, '4': button_4_double_press_action} %}
    {% set triple_map = {'1': button_1_triple_press_action, '2': button_2_triple_press_action, '3': button_3_triple_press_action, '4': button_4_triple_press_action} %}
    {% if command == 'button_' ~ button_num ~ '_short_release' %}
      {{ short_map.get(button_num, 'none') }}
    {% elif command == 'button_' ~ button_num ~ '_hold' %}
      {{ long_map.get(button_num, 'none') }}
    {% elif command == 'button_' ~ button_num ~ '_double_press' %}
      {{ double_map.get(button_num, 'none') }}
    {% elif command == 'button_' ~ button_num ~ '_triple_press' %}
      {{ triple_map.get(button_num, 'none') }}
    {% else %}
      none
    {% endif %}
  selected_current_volume: >-
    {{ state_attr(selected_media, 'volume_level') | default((selected_default_volume | float(35)) / 100, true) }}

actions:
  - if:
      - condition: template
        value_template: "{{ command | regex_search('button_[1-4]') }}"
    then:
      - action: input_text.set_value
        target:
          entity_id: !input last_pressed
        data:
          value: "{{ button_num }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'turn_on' and selected_media is string and selected_media != '' }}"
        sequence:
          - action: media_player.turn_on
            target:
              entity_id: "{{ selected_media }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'turn_off' and selected_media is string and selected_media != '' }}"
        sequence:
          - action: media_player.turn_off
            target:
              entity_id: "{{ selected_media }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'mute' and selected_media is string and selected_media != '' }}"
        sequence:
          - action: media_player.volume_mute
            target:
              entity_id: "{{ selected_media }}"
            data:
              is_volume_muted: true

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'unmute' and selected_media is string and selected_media != '' }}"
        sequence:
          - action: media_player.volume_mute
            target:
              entity_id: "{{ selected_media }}"
            data:
              is_volume_muted: false

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'toggle_power' and selected_media is string and selected_media != '' }}"
        sequence:
          - action: media_player.toggle
            target:
              entity_id: "{{ selected_media }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'toggle_mute' and selected_media is string and selected_media != '' }}"
        sequence:
          - action: media_player.volume_mute
            target:
              entity_id: "{{ selected_media }}"
            data:
              is_volume_muted: "{{ not (state_attr(selected_media, 'is_volume_muted') | default(false)) }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'set_volume' and selected_media is string and selected_media != '' and selected_default_volume_enabled }}"
        sequence:
          - action: media_player.volume_set
            target:
              entity_id: "{{ selected_media }}"
            data:
              volume_level: "{{ (selected_default_volume | float(35)) / 100 }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'source_analog' and selected_source_media is string and selected_source_media != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ selected_source_media }}"
            data:
              source: "Analog"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'source_aoip_01' and selected_source_media is string and selected_source_media != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ selected_source_media }}"
            data:
              source: "AoIP 01"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'source_aoip_02' and selected_source_media is string and selected_source_media != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ selected_source_media }}"
            data:
              source: "AoIP 02"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'source_analog_aoip_01' and selected_source_media is string and selected_source_media != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ selected_source_media }}"
            data:
              source: "Analog + AoIP 01"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'source_analog_aoip_02' and selected_source_media is string and selected_source_media != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ selected_source_media }}"
            data:
              source: "Analog + AoIP 02"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'source_aoip_12' and selected_source_media is string and selected_source_media != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ selected_source_media }}"
            data:
              source: "AoIP 01 + AoIP 02"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'source_mix' and selected_source_media is string and selected_source_media != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ selected_source_media }}"
            data:
              source: "Mix"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'source_toggle_analog_aoip12' and selected_source_media is string and selected_source_media != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ selected_source_media }}"
            data:
              source: >-
                {{ 'AoIP 01 + AoIP 02' if selected_source_current == 'Analog' else 'Analog' }}

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'source_previous' and selected_source_media is string and selected_source_media != '' and selected_source_previous != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ selected_source_media }}"
            data:
              source: "{{ selected_source_previous }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'source_next' and selected_source_media is string and selected_source_media != '' and selected_source_next != '' }}"
        sequence:
          - action: media_player.select_source
            target:
              entity_id: "{{ selected_source_media }}"
            data:
              source: "{{ selected_source_next }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'profile_previous' and selected_profile_select is string and selected_profile_select != '' }}"
        sequence:
          - action: select.select_previous
            target:
              entity_id: "{{ selected_profile_select }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'profile_next' and selected_profile_select is string and selected_profile_select != '' }}"
        sequence:
          - action: select.select_next
            target:
              entity_id: "{{ selected_profile_select }}"

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'led_0' and selected_led_intensity is string and selected_led_intensity != '' }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: "{{ selected_led_intensity }}"
            data:
              value: 0

      - conditions:
          - condition: template
            value_template: "{{ selected_action == 'led_100' and selected_led_intensity is string and selected_led_intensity != '' }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: "{{ selected_led_intensity }}"
            data:
              value: 100

      - conditions:
          - condition: template
            value_template: "{{ rotate_left and selected_rotate_mode == 'volume' and selected_media is string and selected_media != '' }}"
        sequence:
          - action: media_player.volume_set
            target:
              entity_id: "{{ selected_media }}"
            data:
              volume_level: "{{ [0.0, (selected_current_volume | float(0)) - rotate_volume_step] | max }}"

      - conditions:
          - condition: template
            value_template: "{{ rotate_right and selected_rotate_mode == 'volume' and selected_media is string and selected_media != '' }}"
        sequence:
